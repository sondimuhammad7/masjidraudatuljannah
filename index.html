<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuangan Masjid Raudatul Janah</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f8;
    margin:0;
}
header{
    background:#0f766e;
    color:white;
    text-align:center;
    padding:20px;
}
.container{
    width:95%;
    max-width:1100px;
    margin:auto;
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}
input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}
button{
    background:#0f766e;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}
button:hover{
    background:#115e59;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
}
th{
    background:#0f766e;
    color:white;
}
.summary{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}
.box{
    flex:1;
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}
footer{
    text-align:center;
    padding:15px;
    color:white;
    background:#0f766e;
}
</style>
</head>

<body>

<header>
<h1>🕌 Masjid Raudatul Janah</h1>
<p>Sistem Keuangan Masjid</p>
</header>

<div class="container">

<div class="summary">

<div class="box">
<h3>Total Pemasukan</h3>
<h2 id="totalMasuk">Rp 0</h2>
</div>

<div class="box">
<h3>Total Pengeluaran</h3>
<h2 id="totalKeluar">Rp 0</h2>
</div>

<div class="box">
<h3>Saldo</h3>
<h2 id="saldo">Rp 0</h2>
</div>

</div>

<div class="card">
<h2>Tambah Transaksi</h2>

<input type="date" id="tanggal">

<select id="jenis">
<option value="Pemasukan">Pemasukan</option>
<option value="Pengeluaran">Pengeluaran</option>
</select>

<input type="text" id="keterangan" placeholder="Keterangan">

<input type="number" id="nominal" placeholder="Nominal">

<button onclick="simpan()">Simpan</button>

<button onclick="exportPDF()">Export PDF</button>

</div>

<div class="card">
<h2>Grafik Keuangan</h2>
<canvas id="grafikKas"></canvas>
</div>

<div class="card">
<h2>Riwayat Transaksi</h2>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Keterangan</th>
<th>Nominal</th>
</tr>
</thead>

<tbody id="tabelData"></tbody>

</table>

</div>

</div>

<footer>
© 2026 Masjid Raudatul Janah
</footer>

<script>

let data = JSON.parse(localStorage.getItem("transaksi")) || [];

function formatRupiah(nilai){
return "Rp " + nilai.toLocaleString("id-ID");
}

function simpan(){

let transaksi={
tanggal:document.getElementById("tanggal").value,
jenis:document.getElementById("jenis").value,
keterangan:document.getElementById("keterangan").value,
nominal:Number(document.getElementById("nominal").value)
};

data.push(transaksi);

localStorage.setItem(
"transaksi",
JSON.stringify(data)
);

tampil();

}

function tampil(){

let tbody=document.getElementById("tabelData");

tbody.innerHTML="";

let masuk=0;
let keluar=0;

data.forEach(item=>{

if(item.jenis=="Pemasukan"){
masuk+=item.nominal;
}else{
keluar+=item.nominal;
}

tbody.innerHTML += `
<tr>
<td>${item.tanggal}</td>
<td>${item.jenis}</td>
<td>${item.keterangan}</td>
<td>${formatRupiah(item.nominal)}</td>
</tr>
`;

});

document.getElementById("totalMasuk").innerHTML =
formatRupiah(masuk);

document.getElementById("totalKeluar").innerHTML =
formatRupiah(keluar);

document.getElementById("saldo").innerHTML =
formatRupiah(masuk-keluar);

buatGrafik(masuk,keluar);

}

let chart;

function buatGrafik(masuk,keluar){

let ctx =
document.getElementById("grafikKas");

if(chart){
chart.destroy();
}

chart = new Chart(ctx,{
type:'bar',
data:{
labels:['Pemasukan','Pengeluaran'],
datasets:[{
data:[masuk,keluar],
backgroundColor:[
'green',
'red'
]
}]
}
});

}

async function exportPDF(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

doc.text(
"Laporan Keuangan Masjid Raudatul Janah",
10,
10
);

let y=20;

data.forEach((item)=>{

doc.text(
`${item.tanggal} | ${item.jenis} | ${item.keterangan} | Rp ${item.nominal}`,
10,
y
);

y+=10;

});

doc.save("laporan-keuangan.pdf");

}

tampil();

</script>

</body>
</html>
